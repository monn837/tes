<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Untuk Lia ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;overflow:hidden;background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);background-size:400% 400%;animation:bg 12s ease infinite;color:#fff}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.slide{display:none;height:100vh;align-items:center;justify-content:center;flex-direction:column;padding:20px;text-align:center}
.active{display:flex}
.glass{background:rgba(255,255,255,.15);backdrop-filter:blur(12px);padding:25px;border-radius:25px;max-width:900px}
img{max-width:280px;border-radius:20px;margin:10px;box-shadow:0 10px 25px rgba(0,0,0,.3)}
button{padding:12px 24px;border:none;border-radius:25px;cursor:pointer;margin-top:15px}
.gallery{display:flex;flex-wrap:wrap;justify-content:center}
.glow{animation:glow 2s infinite}
@keyframes glow{50%{text-shadow:0 0 20px #fff}}
.star{position:fixed;width:3px;height:3px;background:#fff;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{50%{opacity:.2}}
.fall{position:fixed;top:-20px;animation:fall 8s linear forwards}
@keyframes fall{to{transform:translateY(110vh);opacity:0}}
#secret{display:none;margin-top:15px}
#thanks{display:none;margin-top:20px;font-size:1.2rem}
#hug{display:none}
</style>
</head>
<body>

<audio id="bgm" loop>
<source src="foryou.mp3" type="audio/mpeg">
</audio>

<div class="slide active">
<div class="glass">
<h1 class="glow">💌 Ada Sesuatu Untuk Lia</h1>
<p>Klik untuk membuka...</p>
<button onclick="next()">Buka ❤️</button>
</div>
</div>

<div class="slide"><div class="glass"><h1>📸 Foto 1</h1><img src="foto1.jpg"><br><button onclick="next()">Next</button></div></div>
<div class="slide"><div class="glass"><h1>📸 Foto 2</h1><img src="foto2.jpg"><br><button onclick="next()">Next</button></div></div>
<div class="slide"><div class="glass"><h1>📸 Foto 3</h1><img src="foto3.jpg"><br><button onclick="next()">Next</button></div></div>
<div class="slide"><div class="glass"><h1>📸 Foto 4</h1><img src="foto4.jpg"><br><button onclick="next()">Next</button></div></div>
<div class="slide"><div class="glass"><h1>📸 Foto 5</h1><img src="foto5.jpg"><br><button onclick="next()">Next</button></div></div>

<div class="slide">
<div class="glass">
<h1>📩 Pesan Untuk Lia</h1>
<p id="typing"></p>
<div id="thanks">Terima kasih sudah membaca sampai akhir ❤️</div>
<button id="hug" onclick="showSecret()">🫂 Peluk Virtual</button>
<div id="secret">
🌹 Kamu spesial.<br>
✨ Tetap jadi Lia yang aku kenal ya.
</div>
<br>
<button onclick="location.reload()">🔄 Ulangi</button>
</div>
</div>

<script>
let current=0;
const slides=document.querySelectorAll('.slide');

function next(){
slides[current].classList.remove('active');
current++;
slides[current].classList.add('active');
document.getElementById('bgm').play().catch(()=>{});
if(current===6) startTyping();
}

const text=`Kalau suatu hari nanti kamu masih ragu, nggak apa-apa.

Aku nggak akan maksa kamu buat percaya begitu saja.

Aku cuma ingin kamu tahu kalau ada seseorang di sini yang benar-benar peduli sama kamu, yang selalu senang setiap kali kamu tertawa, dan selalu berharap kamu baik-baik saja.

Terima kasih sudah hadir dan memberi warna dalam hari-hariku.

Tetap jadi Lia yang aku kenal ya. 🌷

Dan kalau suatu hari nanti kamu siap membuka hati untuk percaya lagi, aku berharap aku masih jadi salah satu alasan yang membuat kamu berani mencobanya.

❤️`;

function startTyping(){
let i=0;
const el=document.getElementById('typing');
const t=setInterval(()=>{
el.innerHTML=text.substring(0,i).replace(/\n/g,"<br>");
i++;
if(i>text.length){
clearInterval(t);
document.getElementById('thanks').style.display='block';
document.getElementById('hug').style.display='inline-block';
confetti();
}
},40);
}

function showSecret(){
document.getElementById('secret').style.display='block';
}

for(let i=0;i<150;i++){
let s=document.createElement('div');
s.className='star';
s.style.left=Math.random()*100+'vw';
s.style.top=Math.random()*100+'vh';
document.body.appendChild(s);
}

setInterval(()=>{
let e=document.createElement('div');
e.className='fall';
e.innerHTML=Math.random()>0.5?'❤️':'🌸';
e.style.left=Math.random()*100+'vw';
e.style.fontSize=(20+Math.random()*15)+'px';
document.body.appendChild(e);
setTimeout(()=>e.remove(),8000);
},250);

function confetti(){
for(let i=0;i<120;i++){
let c=document.createElement('div');
c.className='fall';
c.innerHTML='🎉';
c.style.left=Math.random()*100+'vw';
c.style.animationDuration='4s';
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
}
}
</script>
</body>
</html>
